services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skincare-api
    env_file:
      - ./backend/.env
    ports:
      - "8011:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
    networks:
      - skincare

  db:
    image: postgres:16
    container_name: skincare-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: skincare
    ports:
      - "5438:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - skincare

  redis:
    image: redis:7
    container_name: skincare-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - skincare

networks:
  skincare:
    driver: bridge

volumes:
  pg_data:
