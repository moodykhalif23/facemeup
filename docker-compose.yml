name: skincare

services:
  api:
    build:
      context: ./backend_v2
      dockerfile: Dockerfile
    container_name: skincare-v2-api
    env_file:
      - ./backend_v2/.env
    ports:
      - "8012:8000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@skincare-db:5432/skincare?sslmode=disable
      REDIS_URL: redis://skincare-redis:6379/0
      ML_SERVICE_URL: http://ml-service:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_started
    networks:
      - skincare

  ml-service:
    build:
      context: ./backend_v2/ml_service
      dockerfile: Dockerfile
    container_name: skincare-v2-ml
    ports:
      - "8013:8000"
    env_file:
      - ./backend_v2/.env
    volumes:
      - ./backend_v2/ml_service/models:/app/models:ro
    networks:
      - skincare

  db:
    image: postgres:16
    container_name: skincare-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: skincare
    ports:
      - "5438:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend_v2/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - skincare

  redis:
    image: redis:7
    container_name: skincare-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - skincare

networks:
  skincare:
    driver: bridge

volumes:
  pg_data:
