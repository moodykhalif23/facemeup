[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "camera=(self), microphone=(self)"

# Proxy API calls to the backend — bypasses Cloudflare 522 by routing
# server-side from Netlify directly to the origin. Must come before the
# SPA catch-all redirect below.
[[redirects]]
  from   = "/api/*"
  to     = "https://skincare.sozuri.net/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
