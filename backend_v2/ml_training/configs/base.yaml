# Default training configuration. Copy + override per experiment.

data:
  aligned_dir: data/aligned          # output of `skin-precompute`
  val_split: 0.1
  test_split: 0.1
  num_workers: 4
  pin_memory: true
  image_size: 224

model:
  backbone: efficientnet_b0          # spec §5.1 — primary training model
  pretrained: true
  dropout: 0.4
  embed_dim: 256
  n_conditions: 6                    # Acne, Dryness, Oiliness, Hyperpigmentation, Wrinkles, Redness
  n_skin_types: 5                    # Oily, Dry, Combination, Normal, Sensitive
  skin_type_head_enabled: false      # SCIN has no skin-type labels; enable after bootstrap collection

train:
  epochs: 25
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  lr_schedule: cosine
  warmup_epochs: 2
  label_smoothing: 0.0
  grad_clip: 1.0
  mixed_precision: true
  checkpoint_dir: runs/base
  log_every: 20
  save_every_epochs: 5
  early_stop_patience: 6
  seed: 42

loss:
  pos_weight_cap: 5.0
  skin_type_weight: 0.3
